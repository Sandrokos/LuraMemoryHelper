# Build: workflow_dispatch or push to release/** (e.g. release/v1.0/rc → tag v1.0-rc).
# Releases are created only for release/** pushes.

name: Package Addon

on:
  workflow_dispatch:
  push:
    branches:
      - "release/**"

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create release + tag on release branches
    steps:
      - uses: actions/checkout@v4

      # Layout: release/LuraMemoryHelper/... → matches Interface/AddOns/LuraMemoryHelper
      - name: Build addon folder
        run: |
          set -e
          mkdir -p "release/LuraMemoryHelper"
          for f in LuraMemoryHelper.toc *.lua; do
            [ -f "$f" ] && cp "$f" "release/LuraMemoryHelper/"
          done
          if [ -d sounds ]; then cp -r sounds "release/LuraMemoryHelper/"; fi
          if [ -d Media ]; then cp -r Media "release/LuraMemoryHelper/"; fi

      - uses: actions/upload-artifact@v4
        with:
          name: LuraMemoryHelper
          path: release/LuraMemoryHelper
          if-no-files-found: error

      - name: Zip for GitHub Release
        if: startsWith(github.ref, 'refs/heads/release/')
        run: (cd release && zip -r ../LuraMemoryHelper.zip LuraMemoryHelper)

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/heads/release/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF#refs/heads/}"
          VERSION="${BRANCH#release/}"
          # release/v1.0/rc → base v1.0-rc
          BASE_TAG="${VERSION//\//-}"
          if [ -z "$VERSION" ] || [ "$BASE_TAG" = "$BRANCH" ]; then
            echo "Could not derive tag from branch: $BRANCH"
            exit 1
          fi
          # Unique per run so each push creates a new release.
          TAG="${BASE_TAG}.${GITHUB_RUN_NUMBER}"
          PRERELEASE=""
          case "$BASE_TAG" in *rc*) PRERELEASE="--prerelease" ;; esac
          gh release create "$TAG" LuraMemoryHelper.zip \
            --repo "${GITHUB_REPOSITORY}" \
            --title "$BASE_TAG (${GITHUB_RUN_NUMBER})" \
            --target "${GITHUB_SHA}" \
            --generate-notes \
            $PRERELEASE
