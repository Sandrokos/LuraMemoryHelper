name: Package Addon

on:
  workflow_dispatch:
  push:
    branches:
      - "release/**"

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create release + tag on release branches
    steps:
      - uses: actions/checkout@v4

      # Layout: release/LuraMemoryHelper/... → matches Interface/AddOns/LuraMemoryHelper
      - name: Build addon folder
        run: |
          set -e
          mkdir -p "release/LuraMemoryHelper"
          for f in LuraMemoryHelper.toc *.lua; do
            [ -f "$f" ] && cp "$f" "release/LuraMemoryHelper/"
          done
          if [ -d sounds ]; then cp -r sounds "release/LuraMemoryHelper/"; fi
          if [ -d Media ]; then cp -r Media "release/LuraMemoryHelper/"; fi

      # Upload the folder only; upload-artifact already zips once (uploading a .zip was double-zipping).
      # Artifact extract: one zip → LuraMemoryHelper/...
      # Artifact names cannot contain / (e.g. branch release/v1.0).
      - name: Artifact name
        id: artifact
        run: |
          SAFE_REF="${GITHUB_REF_NAME//\//-}"
          echo "name=LuraMemoryHelper-${SAFE_REF}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: release/LuraMemoryHelper
          if-no-files-found: error

      - name: Zip for GitHub Release
        if: startsWith(github.ref, 'refs/heads/release/')
        run: (cd release && zip -r ../LuraMemoryHelper.zip LuraMemoryHelper)

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/heads/release/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF#refs/heads/}"
          VERSION="${BRANCH#release/}"
          # release/v1.0/rc → v1.0-rc; release/v1.2.3 → v1.2.3
          TAG="${VERSION//\//-}"
          if [ -z "$VERSION" ] || [ "$TAG" = "$BRANCH" ]; then
            echo "Could not derive tag from branch: $BRANCH"
            exit 1
          fi
          PRERELEASE=""
          case "$TAG" in *rc*) PRERELEASE="--prerelease" ;; esac
          gh release create "$TAG" LuraMemoryHelper.zip \
            --repo "${GITHUB_REPOSITORY}" \
            --title "$TAG" \
            --target "${GITHUB_SHA}" \
            --generate-notes \
            $PRERELEASE
